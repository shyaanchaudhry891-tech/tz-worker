<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tz Workers - Smart Portal</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        body { background: #121212; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .wrapper { background: #1e1e1e; padding: 25px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 480px; border: 1px solid #333; }
        h2 { text-align: center; margin-bottom: 20px; color: #00adb5; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #333; }
        .tab { flex: 1; text-align: center; padding: 10px; cursor: pointer; color: #aaa; font-weight: bold; }
        .tab.active { color: #00adb5; border-bottom: 3px solid #00adb5; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; color: #ccc; font-size: 14px; }
        input, select { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 16px; outline: none; }
        input:focus, select:focus { border-color: #00adb5; }
        button { width: 100%; padding: 12px; background: #00adb5; border: none; color: #fff; font-size: 16px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #007a80; }
        .card { background: #252525; border-right: 5px solid #00adb5; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .card.red { border-right-color: #ff4d4d; }
        .card.green { border-right-color: #28a745; }
        .value { font-weight: bold; font-size: 16px; }
        .view-section { display: none; }
        .view-section.active { display: block; }
        .success-msg { color: #28a745; text-align: center; margin-top: 10px; font-weight: bold; display: none; }
        .error { color: #ff4d4d; text-align: center; margin-top: 10px; font-weight: bold; display: none; }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="tabs" id="authTabs" style="display: none;">
        <div class="tab active" onclick="switchTab('employee-view')">Employee View</div>
        <div class="tab" onclick="switchTab('admin-view')">Admin Register</div>
    </div>

    <div id="loginPage" class="view-section active">
        <h2>Tz Workers Portal</h2>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="userEmail" placeholder="name@company.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="userPassword" placeholder="••••••••">
        </div>
        <button onclick="checkLogin()">Log In</button>
        <div id="loginError" class="error">Ghalt Email ya Password!</div>
    </div>

    <div id="employeeDashboard" class="view-section">
        <h2 style="font-size: 20px; margin-bottom: 15px;">KhushAamdeed, <span id="empName"></span>!</h2>
        <div class="card"><span>Daily Dihaari (Fix):</span><span class="value" id="vWage">0</span></div>
        <div class="card red"><span>Late Hours:</span><span class="value" id="vLate">0 Hours</span></div>
        <div class="card green"><span>Overtime Hours:</span><span class="value" id="vOT">0 Hours</span></div>
        <div class="card red"><span>Advance Diya:</span><span class="value" id="vAdvance">0</span></div>
        <div class="card green" style="background: #1b3a24;"><strong>Net Salary (Total):</strong><strong class="value" id="vNet" style="color:#28a745;">0</strong></div>
        <button onclick="logOut()" style="background: #444;">Log Out</button>
    </div>

    <div id="adminDashboard" class="view-section">
        <h2>Haazri Register (Admin)</h2>
        
        <div class="input-group">
            <label>Employee Chunain</label>
            <select id="admSelectEmp" onchange="loadAdminEmpData()">
                </select>
        </div>
        <div class="input-group">
            <label>Daily Base Dihaari</label>
            <input type="number" id="admWage" placeholder="Eg. 1500">
        </div>
        <div class="input-group">
            <label>Aane ka Time (In Time)</label>
            <input type="time" id="admInTime" value="09:00">
        </div>
        <div class="input-group">
            <label>Jaane ka Time (Out Time)</label>
            <input type="time" id="admOutTime" value="18:00">
        </div>
        <div class="input-group">
            <label>Advance Payment (Agar Di)</label>
            <input type="number" id="admAdvance" value="0">
        </div>
        <button onclick="calculateAndSaveSalary()">Haazri & Salary Save Karain</button>
        <div id="saveSuccess" class="success-msg">Data kamyabi se save ho gaya!</div>
        <button onclick="logOut()" style="background: #444; margin-top: 10px;">Log Out</button>
    </div>
</div>

    };

    if(!localStorage.getItem("empDatabase")) {
        localStorage.setItem("empDatabase", JSON.stringify(defaultEmployees));
    }
    
    let db = JSON.parse(localStorage.getItem("empDatabase"));
    let currentLoggedInUser = "";

    // Load admin dropdown
    const selectEl = document.getElementById("admSelectEmp");
    for (let email in db) {
        if(db[email].role !== 'admin') {
            let opt = document.createElement("option");
            opt.value = email;
            opt.innerText = db[email].name;
            selectEl.appendChild(opt);
        }
    }

    function checkLogin() {
        const email = document.getElementById('userEmail').value.toLowerCase().trim();
        const pass = document.getElementById('userPassword').value;
        const errMsg = document.getElementById('loginError');

        if (db[email] && db[email].pass === pass) {
            errMsg.style.display = 'none';
            document.getElementById('loginPage').classList.remove('active');
            currentLoggedInUser = email;

            if(db[email].role === 'admin') {
                document.getElementById('adminDashboard').classList.add('active');
                loadAdminEmpData();
            } else {
                document.getElementById('employeeDashboard').classList.add('active');
                showEmployeeData(email);
            }
        } else {
            errMsg.style.display = 'block';
        }
    }

    function showEmployeeData(email) {
        let user = db[email];
        document.getElementById('empName').innerText = user.name;
        document.getElementById('vWage').innerText = user.wage + " Unit";
        document.getElementById('vLate').innerText = user.late + " Hours";
        document.getElementById('vOT').innerText = user.ot + " Hours";
        document.getElementById('vAdvance').innerText = user.advance + " Unit";
        document.getElementById('vNet').innerText = user.net + " Unit";
    }
