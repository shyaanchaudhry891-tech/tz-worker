<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Portal - Daily Payroll</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); width: 100%; max-width: 400px; border: 1px solid #2d2d2d; }
        h2 { text-align: center; margin-bottom: 25px; color: #00bcd4; font-size: 28px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #b3b3b3; font-size: 14px; }
        input { width: 100%; padding: 12px; background: #2a2a2a; border: 1px solid #444; border-radius: 8px; color: #fff; font-size: 16px; outline: none; }
        input:focus { border-color: #00bcd4; }
        button { width: 100%; padding: 14px; background: #00838f; border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #006064; }
        .error { color: #ff5252; text-align: center; margin-top: 15px; font-weight: bold; display: none; }
        .dashboard { display: none; }
        .welcome { text-align: center; color: #00bcd4; margin-bottom: 20px; font-size: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .data-row { display: flex; justify-content: space-between; background: #252525; padding: 12px 15px; margin-bottom: 12px; border-radius: 8px; font-size: 15px; align-items: center; }
        .data-row.blue { border-right: 4px solid #00bcd4; }
        .data-row.red { border-right: 4px solid #ff5252; }
        .data-row.green { border-right: 4px solid #4caf50; }
        .data-label { color: #aaaaaa; }
        .data-value { font-weight: bold; font-size: 16px; }
        .total-row { background: #1b3a24; color: #4caf50; margin-top: 20px; padding: 15px; font-size: 18px; }
        .logout-btn { background: #444; margin-top: 20px; }
        .logout-btn:hover { background: #555; }
    </style>
</head>
<body>

<div class="container">
    <div id="login-form">
        <h2>Employee Portal</h2>
        <div class="input-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="name@company.com">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button onclick="checkLogin()">Log In</button>
        <div id="error-msg" class="error">Ghalt Email ya Password!</div>
    </div>

    <div id="dashboard" class="dashboard">
        <div class="welcome" id="welcome-msg"></div>
        
        <div class="data-row blue">
            <span class="data-label">Daily Dihaari (Fix):</span>
            <span class="data-value" id="val-wage"></span>
        </div>
        <div class="data-row red">
            <span class="data-label">Late Hours (Kitne Ghante):</span>
            <span class="data-value" id="val-late"></span>
        </div>
        <div class="data-row green">
            <span class="data-label">Overtime Hours:</span>
            <span class="data-value" id="val-ot"></span>
        </div>
        <div class="data-row red">
            <span class="data-label">Advance Liya Gaya:</span>
            <span class="data-value" id="val-advance"></span>
        </div>
        <div class="data-row green total-row">
            <span class="data-label" style="color: #4caf50;">Net Salary (Total):</span>
            <span class="data-value" id="val-net"></span>
        </div>

        <button class="logout-btn" onclick="logout()">Log Out</button>
    </div>
</div>

<script>
    // Workers Data
    const employeeData = {
        "moiz@test.com": { pass: "moiz123", name: "Moiz Ahmed", wage: "1,500 KD", late: "1.5 Hours", ot: "0 Hours", advance: "0 KD", net: "1,350 KD" },
        "kala@test.com": { pass: "kala123", name: "Kala Khan", wage: "1,500 KD", late: "0 Hours (On Time)", ot: "2 Hours", advance: "50 KD", net: "1,600 KD" },
        "doger@test.com": { pass: "doger123", name: "Doger Sahab", wage: "2,000 KD", late: "0 Hours", ot: "4 Hours", advance: "20 KD", net: "2,380 KD" }
    };

    function checkLogin() {
        const email = document.getElementById('email').value.toLowerCase().trim();
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('error-msg');

        if (employeeData[email] && employeeData[email].pass === pass) {
            errorMsg.style.display = 'none';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';

            // Load Data
            document.getElementById('welcome-msg').innerText = "KhushAamdeed, " + employeeData[email].name + "!";
            document.getElementById('val-wage').innerText = employeeData[email].wage;
            document.getElementById('val-late').innerText = employeeData[email].late;
            document.getElementById('val-ot').innerText = employeeData[email].ot;
            document.getElementById('val-advance').innerText = employeeData[email].advance;
            document.getElementById('val-net').innerText = employeeData[email].net;
        } else {
            errorMsg.style.display = 'block';
        }
    }

    function logout() {
        document.getElementById('email').value = '';
        document.getElementById('password').value = '';
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
    }
</script>

</body>
</html>
